<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Bettin2Win animated dashboard preview</title>
  <desc id="desc">A stylized Bettin2Win dashboard with live provider signals, odds cards, race lanes, and animated line movement.</desc>
  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07121f"/>
      <stop offset="0.48" stop-color="#0b2a2a"/>
      <stop offset="1" stop-color="#241334"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14324a"/>
      <stop offset="1" stop-color="#10202f"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#202b45"/>
      <stop offset="1" stop-color="#11172a"/>
    </linearGradient>
    <linearGradient id="track" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="0.5" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#fb7185"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.18 0 0 0 0 0.83 0 0 0 0 0.72 0 0 0 0.35 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="rounded">
      <rect x="35" y="34" width="1130" height="352" rx="28"/>
    </clipPath>
  </defs>
  <style>
    .frame { fill: url(#heroBg); }
    .grid { stroke: rgba(255,255,255,0.08); stroke-width: 1; }
    .panel { fill: rgba(8,19,31,0.78); stroke: rgba(255,255,255,0.13); stroke-width: 1.2; }
    .card { stroke: rgba(255,255,255,0.14); stroke-width: 1.2; }
    .title { fill: #ffffff; font: 800 62px system-ui, -apple-system, Segoe UI, sans-serif; letter-spacing: 0; }
    .subtitle { fill: #b7c8d8; font: 500 20px system-ui, -apple-system, Segoe UI, sans-serif; letter-spacing: 0; }
    .tiny { fill: #9fb3c8; font: 600 13px system-ui, -apple-system, Segoe UI, sans-serif; letter-spacing: 0; }
    .label { fill: #edf8ff; font: 700 15px system-ui, -apple-system, Segoe UI, sans-serif; letter-spacing: 0; }
    .price { fill: #5eead4; font: 800 24px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .muted { fill: #8ea3b6; font: 600 12px system-ui, -apple-system, Segoe UI, sans-serif; }
    .live { fill: #34d399; }
    .hot { fill: #fbbf24; }
    .pink { fill: #fb7185; }
    .blue { fill: #60a5fa; }
    .cardA { fill: url(#cardA); }
    .cardB { fill: url(#cardB); }
    .line { fill: none; stroke: #5eead4; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 480; animation: drawLine 3.2s ease-in-out infinite; }
    .ticker { animation: ticker 16s linear infinite; }
    .pulse { animation: pulse 1.7s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    .runnerA { animation: runnerA 5.5s ease-in-out infinite; }
    .runnerB { animation: runnerB 5.5s ease-in-out infinite; }
    .runnerC { animation: runnerC 5.5s ease-in-out infinite; }
    .puck { animation: puck 4.3s ease-in-out infinite; }
    .spark { animation: spark 2.8s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-300px); } }
    @keyframes drawLine { 0% { stroke-dashoffset: 480; } 45%, 65% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: -480; } }
    @keyframes pulse { 0%, 100% { opacity: 0.55; transform: scale(1); } 50% { opacity: 1; transform: scale(1.18); } }
    @keyframes spark { 0%, 100% { opacity: 0.35; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.25); } }
    @keyframes runnerA { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(115px); } }
    @keyframes runnerB { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(87px); } }
    @keyframes runnerC { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(140px); } }
    @keyframes puck { 0%, 100% { transform: translate(0, 0); } 30% { transform: translate(62px, -12px); } 65% { transform: translate(138px, 8px); } }
    @media (prefers-reduced-motion: reduce) {
      .ticker, .pulse, .runnerA, .runnerB, .runnerC, .puck, .spark, .line { animation: none !important; }
    }
  </style>

  <rect class="frame" width="1200" height="420" rx="34"/>
  <g clip-path="url(#rounded)">
    <path class="grid" d="M50 92H1150M50 152H1150M50 212H1150M50 272H1150M50 332H1150M145 35V386M285 35V386M425 35V386M565 35V386M705 35V386M845 35V386M985 35V386M1125 35V386"/>
    <circle cx="1050" cy="72" r="72" fill="#2dd4bf" opacity="0.08"/>
    <circle cx="220" cy="330" r="96" fill="#fb7185" opacity="0.08"/>
  </g>

  <rect x="35" y="34" width="1130" height="352" rx="28" fill="none" stroke="rgba(255,255,255,0.16)" stroke-width="1.5"/>

  <g transform="translate(74 75)">
    <text class="title" x="0" y="64">Bettin2Win</text>
    <text class="subtitle" x="4" y="103">Live odds, plain-English picks, and racing analytics</text>
    <g transform="translate(4 132)">
      <rect x="0" y="0" width="96" height="30" rx="15" fill="rgba(52,211,153,0.16)" stroke="rgba(52,211,153,0.7)"/>
      <circle class="pulse live" cx="18" cy="15" r="5"/>
      <text class="tiny" x="32" y="20" fill="#d7fff3">LIVE FEEDS</text>
      <rect x="112" y="0" width="116" height="30" rx="15" fill="rgba(96,165,250,0.15)" stroke="rgba(96,165,250,0.65)"/>
      <text class="tiny" x="129" y="20" fill="#dbeafe">BEGINNER GUIDE</text>
      <rect x="244" y="0" width="132" height="30" rx="15" fill="rgba(251,191,36,0.15)" stroke="rgba(251,191,36,0.65)"/>
      <text class="tiny" x="261" y="20" fill="#fff2c2">FREE-TIER SMART</text>
    </g>
  </g>

  <g transform="translate(618 62)">
    <rect class="panel" x="0" y="0" width="500" height="280" rx="24"/>
    <rect x="22" y="20" width="456" height="42" rx="18" fill="rgba(255,255,255,0.06)"/>
    <text class="tiny" x="42" y="47">provider pulse</text>
    <g class="ticker" transform="translate(175 28)">
      <text class="tiny" x="0" y="16">MLB +118</text>
      <text class="tiny" x="92" y="16">NHL -142</text>
      <text class="tiny" x="184" y="16">HORSE 6.5</text>
      <text class="tiny" x="300" y="16">SOCCER 57%</text>
      <text class="tiny" x="424" y="16">MLB +118</text>
      <text class="tiny" x="516" y="16">NHL -142</text>
    </g>

    <g transform="translate(24 88)">
      <rect class="card cardA" x="0" y="0" width="138" height="82" rx="16"/>
      <text class="muted" x="16" y="25">Hockey</text>
      <circle class="puck" cx="27" cy="54" r="8" fill="#0f172a" stroke="#e2e8f0" stroke-width="3"/>
      <text class="price" x="76" y="61">-142</text>
    </g>

    <g transform="translate(184 88)">
      <rect class="card cardB" x="0" y="0" width="138" height="82" rx="16"/>
      <text class="muted" x="16" y="25">Soccer model</text>
      <rect x="18" y="44" width="88" height="12" rx="6" fill="rgba(255,255,255,0.12)"/>
      <rect class="pulse" x="18" y="44" width="61" height="12" rx="6" fill="#60a5fa"/>
      <text class="price" x="82" y="65">57%</text>
    </g>

    <g transform="translate(344 88)">
      <rect class="card cardA" x="0" y="0" width="132" height="82" rx="16"/>
      <text class="muted" x="16" y="25">Best price</text>
      <text class="price" x="18" y="61">+210</text>
      <circle class="spark hot" cx="107" cy="52" r="8"/>
    </g>

    <g transform="translate(34 205)">
      <text class="muted" x="0" y="-10">Horse racing result order</text>
      <rect x="0" y="0" width="420" height="12" rx="6" fill="rgba(255,255,255,0.11)"/>
      <rect x="0" y="24" width="420" height="12" rx="6" fill="rgba(255,255,255,0.11)"/>
      <rect x="0" y="48" width="420" height="12" rx="6" fill="rgba(255,255,255,0.11)"/>
      <rect x="318" y="-6" width="4" height="72" rx="2" fill="#f8fafc" opacity="0.55"/>
      <circle class="runnerA" cx="35" cy="6" r="9" fill="#2dd4bf" filter="url(#softGlow)"/>
      <circle class="runnerB" cx="35" cy="30" r="9" fill="#fbbf24" filter="url(#softGlow)"/>
      <circle class="runnerC" cx="35" cy="54" r="9" fill="#fb7185" filter="url(#softGlow)"/>
    </g>
  </g>

  <g transform="translate(80 252)">
    <rect class="panel" x="0" y="0" width="430" height="94" rx="22"/>
    <text class="muted" x="24" y="30">Line movement</text>
    <path class="line" d="M25 70 C82 36 120 76 168 45 S260 22 315 54 S382 76 408 28"/>
    <circle class="spark blue" cx="408" cy="28" r="7"/>
  </g>

  <g transform="translate(80 362)">
    <rect x="0" y="0" width="190" height="7" rx="3.5" fill="url(#track)"/>
    <rect x="208" y="0" width="136" height="7" rx="3.5" fill="#60a5fa"/>
    <rect x="362" y="0" width="92" height="7" rx="3.5" fill="#a78bfa"/>
  </g>
</svg>
