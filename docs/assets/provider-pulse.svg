<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Bettin2Win provider pulse</title>
  <desc id="desc">Provider feeds flow into the odds engine, racing analytics, AI analyst, and the React dashboard.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.52" stop-color="#0a2229"/>
      <stop offset="1" stop-color="#21162f"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#172c44"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5eead4"/>
    </marker>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.36 0 0 0 0 0.91 0 0 0 0 0.83 0 0 0 0.65 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    .bg { fill: url(#bg); }
    .node { fill: url(#node); stroke: rgba(255,255,255,0.16); stroke-width: 1.3; }
    .nodeHot { fill: rgba(20,83,74,0.72); stroke: rgba(94,234,212,0.78); stroke-width: 1.4; }
    .path { fill: none; stroke: rgba(148,163,184,0.42); stroke-width: 3; marker-end: url(#arrow); }
    .pathHot { fill: none; stroke: rgba(94,234,212,0.65); stroke-width: 4; marker-end: url(#arrow); }
    .title { fill: #ffffff; font: 800 33px system-ui, -apple-system, Segoe UI, sans-serif; letter-spacing: 0; }
    .copy { fill: #aebed0; font: 600 15px system-ui, -apple-system, Segoe UI, sans-serif; letter-spacing: 0; }
    .label { fill: #f8fafc; font: 800 17px system-ui, -apple-system, Segoe UI, sans-serif; letter-spacing: 0; }
    .small { fill: #a7b7c9; font: 600 12px system-ui, -apple-system, Segoe UI, sans-serif; letter-spacing: 0; }
    .dot { fill: #5eead4; filter: url(#glow); }
    .dotB { fill: #fbbf24; filter: url(#glow); }
    .dotC { fill: #60a5fa; filter: url(#glow); }
    .beat { animation: beat 1.8s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    @keyframes beat { 0%, 100% { transform: scale(1); opacity: 0.75; } 50% { transform: scale(1.08); opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      .beat, animateMotion { animation: none !important; }
    }
  </style>

  <rect class="bg" width="1200" height="360" rx="28"/>
  <rect x="28" y="26" width="1144" height="308" rx="24" fill="rgba(255,255,255,0.045)" stroke="rgba(255,255,255,0.13)"/>
  <text class="title" x="54" y="70">Live data path</text>
  <text class="copy" x="56" y="98">Adapters protect the frontend from messy provider payloads, quotas, and fallbacks.</text>

  <path id="p1" class="path" d="M 205 148 C 315 120, 370 120, 492 166"/>
  <path id="p2" class="path" d="M 205 210 C 315 238, 374 226, 492 194"/>
  <path id="p3" class="path" d="M 205 270 C 318 282, 374 250, 492 210"/>
  <path id="p4" class="pathHot" d="M 610 180 C 700 180, 742 150, 827 132"/>
  <path id="p5" class="pathHot" d="M 610 195 C 706 216, 746 235, 827 250"/>
  <path id="p6" class="path" d="M 920 132 C 990 148, 1017 166, 1080 190"/>
  <path id="p7" class="path" d="M 920 250 C 992 235, 1018 214, 1080 195"/>

  <g transform="translate(66 120)">
    <rect class="node" x="0" y="0" width="140" height="54" rx="16"/>
    <text class="label" x="18" y="24">Odds APIs</text>
    <text class="small" x="18" y="42">books + lines</text>
  </g>
  <g transform="translate(66 182)">
    <rect class="node" x="0" y="0" width="140" height="54" rx="16"/>
    <text class="label" x="18" y="24">RapidAPI</text>
    <text class="small" x="18" y="42">sports backups</text>
  </g>
  <g transform="translate(66 244)">
    <rect class="node" x="0" y="0" width="140" height="54" rx="16"/>
    <text class="label" x="18" y="24">Racing feeds</text>
    <text class="small" x="18" y="42">cards + results</text>
  </g>

  <g class="beat" transform="translate(492 148)">
    <rect class="nodeHot" x="0" y="0" width="118" height="76" rx="20"/>
    <text class="label" x="22" y="31">Odds</text>
    <text class="label" x="22" y="52">Engine</text>
  </g>

  <g transform="translate(827 94)">
    <rect class="node" x="0" y="0" width="118" height="76" rx="20"/>
    <text class="label" x="18" y="31">React</text>
    <text class="small" x="18" y="52">dashboard</text>
  </g>
  <g transform="translate(827 212)">
    <rect class="node" x="0" y="0" width="118" height="76" rx="20"/>
    <text class="label" x="18" y="31">Python</text>
    <text class="small" x="18" y="52">analytics</text>
  </g>
  <g transform="translate(1040 158)">
    <rect class="nodeHot" x="0" y="0" width="108" height="74" rx="20"/>
    <text class="label" x="20" y="30">Better</text>
    <text class="small" x="20" y="51">plain English</text>
  </g>

  <circle class="dot" r="7">
    <animateMotion dur="3.6s" repeatCount="indefinite">
      <mpath href="#p1"/>
    </animateMotion>
  </circle>
  <circle class="dotB" r="7">
    <animateMotion dur="4.1s" repeatCount="indefinite">
      <mpath href="#p2"/>
    </animateMotion>
  </circle>
  <circle class="dotC" r="7">
    <animateMotion dur="4.7s" repeatCount="indefinite">
      <mpath href="#p3"/>
    </animateMotion>
  </circle>
  <circle class="dot" r="8">
    <animateMotion dur="2.9s" repeatCount="indefinite">
      <mpath href="#p4"/>
    </animateMotion>
  </circle>
  <circle class="dotB" r="8">
    <animateMotion dur="3.3s" repeatCount="indefinite">
      <mpath href="#p5"/>
    </animateMotion>
  </circle>
  <circle class="dotC" r="7">
    <animateMotion dur="3.8s" repeatCount="indefinite">
      <mpath href="#p6"/>
    </animateMotion>
  </circle>
  <circle class="dot" r="7">
    <animateMotion dur="4.2s" repeatCount="indefinite">
      <mpath href="#p7"/>
    </animateMotion>
  </circle>
</svg>
