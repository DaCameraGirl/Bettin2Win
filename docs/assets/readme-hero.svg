<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" role="img" aria-label="Bettin2Win — beginner odds guide, not a sportsbook">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d121c"/>
      <stop offset="45%" stop-color="#070a12"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
    <radialGradient id="glowGreen" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.35"/>
      <stop offset="55%" stop-color="#4ade80" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCyan" cx="92%" cy="18%" r="45%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowPurple" cx="8%" cy="88%" r="42%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e7edf5"/>
      <stop offset="50%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M 44 0 L 0 0 0 44" fill="none" stroke="#243044" stroke-width="1" opacity="0.45"/>
    </pattern>
    <clipPath id="round">
      <rect width="1200" height="280" rx="24"/>
    </clipPath>
  </defs>

  <g clip-path="url(#round)">
    <rect width="1200" height="280" fill="url(#sky)"/>
    <rect width="1200" height="280" fill="url(#glowGreen)"/>
    <rect width="1200" height="280" fill="url(#glowCyan)"/>
    <rect width="1200" height="280" fill="url(#glowPurple)"/>
    <rect width="1200" height="280" fill="url(#grid)" opacity="0.55"/>

    <ellipse cx="600" cy="300" rx="520" ry="120" fill="#4ade80" opacity="0.04"/>
    <ellipse cx="980" cy="40" rx="180" ry="80" fill="#22d3ee" opacity="0.06"/>

    <text x="600" y="118" text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="56" font-weight="800" letter-spacing="-1.5" fill="url(#titleGrad)">Bettin2Win</text>
    <text x="600" y="158" text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#8a99b0">The beginner&apos;s odds guide — not a sportsbook</text>

    <rect x="330" y="182" width="540" height="2" rx="1" fill="#243044"/>
    <rect x="430" y="182" width="340" height="2" rx="1" fill="#4ade80" opacity="0.7">
      <animate attributeName="opacity" values="0.45;0.95;0.45" dur="4s" repeatCount="indefinite"/>
    </rect>

    <g font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#8a99b0">
      <text x="600" y="218" text-anchor="middle">Compare lines · Translate odds · Learn before you wager</text>
      <text x="600" y="244" text-anchor="middle" fill="#4ade80" opacity="0.9">Informational only · Bet responsibly · 21+ where legal</text>
    </g>

    <circle cx="108" cy="72" r="3" fill="#4ade80" opacity="0.7">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1092" cy="208" r="2.5" fill="#22d3ee" opacity="0.7">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1040" cy="58" r="2" fill="#a78bfa" opacity="0.6"/>
    <circle cx="148" cy="220" r="2" fill="#fbbf24" opacity="0.55"/>
  </g>
</svg>