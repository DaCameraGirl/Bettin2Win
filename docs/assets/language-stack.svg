<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 300" role="img" aria-labelledby="title desc">
  <title id="title">Bettin2Win language mix</title>
  <desc id="desc">A visual language mix showing TypeScript, CSS, Python, PowerShell, and HTML roles in the repository.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#091523"/>
      <stop offset="1" stop-color="#18213a"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    .bg { fill: url(#bg); }
    .title { fill: #ffffff; font: 800 34px system-ui, -apple-system, Segoe UI, sans-serif; letter-spacing: 0; }
    .copy { fill: #b9c8d8; font: 600 15px system-ui, -apple-system, Segoe UI, sans-serif; letter-spacing: 0; }
    .label { fill: #f8fafc; font: 800 18px system-ui, -apple-system, Segoe UI, sans-serif; letter-spacing: 0; }
    .small { fill: #9fb0c4; font: 600 13px system-ui, -apple-system, Segoe UI, sans-serif; letter-spacing: 0; }
    .percent { fill: #f8fafc; font: 800 20px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .bar { transform-origin: left center; transform-box: fill-box; animation: grow 1.1s ease-out both; }
    .bar.css { animation-delay: 0.1s; }
    .bar.py { animation-delay: 0.2s; }
    .bar.ps { animation-delay: 0.3s; }
    .bar.html { animation-delay: 0.4s; }
    .shine { animation: shine 4s linear infinite; }
    @keyframes grow { from { transform: scaleX(0.04); opacity: 0.6; } to { transform: scaleX(1); opacity: 1; } }
    @keyframes shine { from { transform: translateX(-180px); } to { transform: translateX(880px); } }
    @media (prefers-reduced-motion: reduce) {
      .bar, .shine { animation: none !important; }
    }
  </style>

  <rect class="bg" width="1100" height="300" rx="26"/>
  <rect x="26" y="26" width="1048" height="248" rx="22" fill="rgba(255,255,255,0.045)" stroke="rgba(255,255,255,0.13)"/>
  <text class="title" x="54" y="72">Language mix that matches the repo</text>
  <text class="copy" x="56" y="101">TypeScript drives the app and engine. CSS, Python, PowerShell, and HTML each have a clear purpose.</text>

  <g transform="translate(56 135)">
    <rect x="0" y="0" width="938" height="34" rx="17" fill="rgba(255,255,255,0.08)"/>
    <rect class="bar ts" x="0" y="0" width="726" height="34" rx="17" fill="#3178c6"/>
    <rect class="bar css" x="726" y="0" width="106" height="34" fill="#663399"/>
    <rect class="bar py" x="832" y="0" width="71" height="34" fill="#3776ab"/>
    <rect class="bar ps" x="903" y="0" width="33" height="34" fill="#5391fe"/>
    <rect class="bar html" x="936" y="0" width="2" height="34" rx="1" fill="#e34f26"/>
    <rect class="shine" x="-180" y="0" width="130" height="34" fill="rgba(255,255,255,0.18)" filter="url(#glow)"/>
  </g>

  <g transform="translate(58 205)">
    <circle cx="9" cy="-5" r="8" fill="#3178c6"/><text class="label" x="25" y="1">TypeScript</text><text class="percent" x="136" y="1">77.4%</text><text class="small" x="214" y="1">React, engine, AI analyst, shared types</text>
    <circle cx="9" cy="34" r="8" fill="#663399"/><text class="label" x="25" y="40">CSS</text><text class="percent" x="82" y="40">11.3%</text><text class="small" x="160" y="40">dashboard design, cards, animations</text>
    <circle cx="492" cy="-5" r="8" fill="#3776ab"/><text class="label" x="508" y="1">Python</text><text class="percent" x="584" y="1">7.6%</text><text class="small" x="651" y="1">FastAPI racing analytics</text>
    <circle cx="492" cy="34" r="8" fill="#5391fe"/><text class="label" x="508" y="40">PowerShell</text><text class="percent" x="620" y="40">3.5%</text><text class="small" x="689" y="40">desktop launcher scripts</text>
    <circle cx="842" cy="34" r="8" fill="#e34f26"/><text class="label" x="858" y="40">HTML</text><text class="percent" x="918" y="40">0.2%</text>
  </g>
</svg>
