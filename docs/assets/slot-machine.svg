<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 180" role="img" aria-label="Bettin2Win animated slot machine — learn the odds, not a casino">
  <defs>
    <linearGradient id="cabinet" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a2331"/>
      <stop offset="100%" stop-color="#0b0f17"/>
    </linearGradient>
    <linearGradient id="marquee" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <clipPath id="reelClip">
      <rect x="0" y="0" width="72" height="72" rx="8"/>
    </clipPath>
  </defs>

  <rect x="8" y="8" width="404" height="164" rx="22" fill="url(#cabinet)" stroke="#243044" stroke-width="3"/>
  <rect x="24" y="22" width="372" height="28" rx="14" fill="url(#marquee)" opacity="0.95"/>
  <text x="210" y="41" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#0b0f17">BETTIN2WIN · LEARN THE LINE</text>

  <rect x="54" y="68" width="312" height="84" rx="16" fill="#131a26" stroke="#4ade80" stroke-width="2"/>

  <g transform="translate(78,74)">
    <rect width="72" height="72" rx="8" fill="#0b0f17" stroke="#243044"/>
    <g clip-path="url(#reelClip)">
      <g>
        <text x="36" y="34" text-anchor="middle" font-size="28">🏈</text>
        <text x="36" y="70" text-anchor="middle" font-size="28">🏀</text>
        <text x="36" y="106" text-anchor="middle" font-size="28">⚽</text>
        <animateTransform attributeName="transform" type="translate" values="0 0; 0 -72; 0 -144; 0 0" dur="2.4s" repeatCount="indefinite"/>
      </g>
    </g>
  </g>

  <g transform="translate(174,74)">
    <rect width="72" height="72" rx="8" fill="#0b0f17" stroke="#243044"/>
    <g clip-path="url(#reelClip)">
      <g>
        <text x="36" y="34" text-anchor="middle" font-size="28">📈</text>
        <text x="36" y="70" text-anchor="middle" font-size="28">💡</text>
        <text x="36" y="106" text-anchor="middle" font-size="28">✦</text>
        <animateTransform attributeName="transform" type="translate" values="0 -36; 0 -108; 0 0; 0 -36" dur="2.1s" repeatCount="indefinite"/>
      </g>
    </g>
  </g>

  <g transform="translate(270,74)">
    <rect width="72" height="72" rx="8" fill="#0b0f17" stroke="#243044"/>
    <g clip-path="url(#reelClip)">
      <g>
        <text x="36" y="34" text-anchor="middle" font-size="28">🎯</text>
        <text x="36" y="70" text-anchor="middle" font-size="28">📖</text>
        <text x="36" y="106" text-anchor="middle" font-size="28">🛡️</text>
        <animateTransform attributeName="transform" type="translate" values="0 -72; 0 -144; 0 0; 0 -72" dur="2.7s" repeatCount="indefinite"/>
      </g>
    </g>
  </g>

  <rect x="150" y="156" width="120" height="10" rx="5" fill="#2a7a4d"/>
  <text x="210" y="176" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#8a99b0">Not a casino · informational only</text>
</svg>